<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Balıkesir Adres Bul</title>
<style>
  :root{
    --bg:#000000;
    --panel:#0f0f0f;
    --border:#3a3a3a;
    --border-dim:#2a2a2a;
    --text:#e8e8e8;
    --text-dim:#8a8a8a;
    --accent:#4CAF50;
    --accent-dark:#3d9140;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:20px 16px 60px;
  }
  h1{
    font-size:17px;
    font-weight:600;
    color:var(--text-dim);
    text-align:center;
    margin:4px 0 22px;
    letter-spacing:.3px;
  }
  .field{
    position:relative;
    margin-bottom:16px;
  }
  select{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    background:var(--panel);
    color:var(--text);
    border:1.5px solid var(--border);
    border-radius:8px;
    padding:16px 40px 16px 16px;
    font-size:16px;
    font-family:inherit;
  }
  select:disabled{
    color:var(--text-dim);
    opacity:.5;
  }
  select:not(:disabled){
    border-color:#555;
  }
  .field::after{
    content:"";
    position:absolute;
    right:16px;
    top:50%;
    width:10px;
    height:10px;
    border-right:2px solid var(--text-dim);
    border-bottom:2px solid var(--text-dim);
    transform:translateY(-70%) rotate(45deg);
    pointer-events:none;
  }
  button#sorgula{
    width:100%;
    padding:17px;
    margin-top:6px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:600;
    letter-spacing:.3px;
  }
  button#sorgula:active{ background:var(--accent-dark); }
  button#sorgula:disabled{
    background:#2c3e2d;
    color:#6b8c6d;
  }
  .hint{
    text-align:center;
    color:var(--text-dim);
    font-size:12.5px;
    margin-top:14px;
    line-height:1.5;
  }
  .result{
    margin-top:18px;
    padding:14px 16px;
    background:var(--panel);
    border:1px solid var(--border-dim);
    border-radius:8px;
    font-size:14px;
    color:var(--text-dim);
    display:none;
  }
  .result.show{ display:block; }
  .result b{ color:var(--text); }
  a#mapLink{
    display:block;
    text-align:center;
    margin-top:12px;
    padding:15px;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
  }
  a#mapLink:active{ background:var(--accent-dark); }
</style>
</head>
<body>

<h1>Balıkesir Adres Bul</h1>

<div class="field">
  <select id="ilce" disabled>
    <option value="">Yükleniyor…</option>
  </select>
</div>

<div class="field">
  <select id="mahalle" disabled>
    <option value="">Mahalle Seçiniz</option>
  </select>
</div>

<div class="field">
  <select id="sokak" disabled>
    <option value="">Sokak Seçiniz</option>
  </select>
</div>

<div class="field">
  <select id="kapino" disabled>
    <option value="">Kapı No Seçiniz (opsiyonel)</option>
  </select>
</div>

<button id="sorgula" disabled>Sorgula</button>

<div class="hint">Kapı numarası seçmezseniz o sokaktaki en küçük kapı numarasının konumu açılır.</div>

<div class="result" id="result"></div>
<a id="mapLink" style="display:none" href="#">📍 Haritada Aç</a>

<script>
/* ============================================================
   VERİ (DATA)
   Veri artık ayrı bir data.json dosyasından yükleniyor.
   Belediyeden tam veri (4000 satır) gelince sadece data.json
   dosyasını değiştirmeniz yeterli -- bu index.html dosyasına
   dokunmanıza gerek kalmaz.
   Sütunlar: Ilce, Mahalle, SokakAdi, KapiNo, ApartmanAdi, Enlem, Boylam, EnKucukKapiNo
   ============================================================ */
let DATA = [];

async function loadData(){
  try{
    const res = await fetch("data.json");
    DATA = await res.json();
    fillSelect(ilceSel, uniq(DATA.map(d=>d.Ilce)), "İlçe Seçiniz");
    ilceSel.disabled = false;
  } catch(err){
    ilceSel.innerHTML = `<option value="">Veri yüklenemedi (data.json bulunamadı)</option>`;
    console.error("Veri yükleme hatası:", err);
  }
}


const ilceSel = document.getElementById('ilce');
const mahalleSel = document.getElementById('mahalle');
const sokakSel = document.getElementById('sokak');
const kapinoSel = document.getElementById('kapino');
const sorgulaBtn = document.getElementById('sorgula');
const resultBox = document.getElementById('result');

function uniq(arr){ return [...new Set(arr)].sort((a,b)=>a.localeCompare(b,'tr')); }

function fillSelect(sel, values, placeholder){
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    values.map(v => `<option value="${v}">${v}</option>`).join('');
}

// Kapı No listesini doldurur; aynı numarada birden fazla apartman varsa
// seçenek etiketine apartman adını ekleyerek ayırt eder. option value = satır dizinindeki index (DATA_INDEXED).
function fillKapiNoSelect(rows){
  // KapiNo'ya göre grupla
  const groups = {};
  rows.forEach((r, idx) => {
    if(!groups[r.KapiNo]) groups[r.KapiNo] = [];
    groups[r.KapiNo].push(idx);
  });
  const kapiNolar = Object.keys(groups).sort((a,b)=>(parseInt(a)||0)-(parseInt(b)||0));
  let html = `<option value="">Kapı No Seçiniz (opsiyonel)</option>`;
  kapiNolar.forEach(kn=>{
    const idxs = groups[kn];
    if(idxs.length === 1){
      html += `<option value="${idxs[0]}">${kn}</option>`;
    } else {
      idxs.forEach(i=>{
        const ap = rows[i].ApartmanAdi;
        html += `<option value="${i}">${kn}${ap ? ' - '+ap : ' - (apartmansız)'}</option>`;
      });
    }
  });
  kapinoSel.innerHTML = html;
}

function resetFrom(level){
  if(level<=1){ mahalleSel.disabled=true; fillSelect(mahalleSel,[], "Mahalle Seçiniz"); }
  if(level<=2){ sokakSel.disabled=true; fillSelect(sokakSel,[], "Sokak Seçiniz"); }
  if(level<=3){ kapinoSel.disabled=true; fillSelect(kapinoSel,[], "Kapı No Seçiniz (opsiyonel)"); }
  sorgulaBtn.disabled = true;
  resultBox.classList.remove('show');
  mapLink.style.display = 'none';
}

ilceSel.addEventListener('change', ()=>{
  resetFrom(1);
  if(!ilceSel.value) return;
  const mahalleler = uniq(DATA.filter(d=>d.Ilce===ilceSel.value).map(d=>d.Mahalle));
  fillSelect(mahalleSel, mahalleler, "Mahalle Seçiniz");
  mahalleSel.disabled = false;
});

mahalleSel.addEventListener('change', ()=>{
  resetFrom(2);
  if(!mahalleSel.value) return;
  const sokaklar = uniq(DATA.filter(d=>d.Ilce===ilceSel.value && d.Mahalle===mahalleSel.value).map(d=>d.SokakAdi));
  fillSelect(sokakSel, sokaklar, "Sokak Seçiniz");
  sokakSel.disabled = false;
});

let currentStreetRows = [];

sokakSel.addEventListener('change', ()=>{
  resetFrom(3);
  if(!sokakSel.value) return;
  currentStreetRows = DATA.filter(d=>d.Ilce===ilceSel.value && d.Mahalle===mahalleSel.value && d.SokakAdi===sokakSel.value);
  fillKapiNoSelect(currentStreetRows);
  kapinoSel.disabled = false;
  sorgulaBtn.disabled = false;
});

kapinoSel.addEventListener('change', ()=>{
  sorgulaBtn.disabled = false;
});

function isiOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

const mapLink = document.getElementById('mapLink');

function buildMapUrl(lat, lng, label){
  const encodedLabel = encodeURIComponent(label || '');
  if(isiOS()){
    return `https://maps.apple.com/?ll=${lat},${lng}&q=${encodedLabel}`;
  }
  // Android/diğer: geo: şeması, gerçek bir tıklamada varsayılan harita
  // uygulaması seçicisini (Google Maps, Yandex, vb.) tetikler
  return `geo:${lat},${lng}?q=${lat},${lng}(${encodedLabel})`;
}

sorgulaBtn.addEventListener('click', ()=>{
  if(!ilceSel.value || !mahalleSel.value || !sokakSel.value || currentStreetRows.length===0) return;

  let row;
  if(kapinoSel.value !== ""){
    row = currentStreetRows[parseInt(kapinoSel.value)];
  } else {
    // Kapı no seçilmediyse: veri tablosundaki "En Kucuk Kapi No" değerine sahip satırı kullan
    const enKucuk = currentStreetRows[0].EnKucukKapiNo;
    row = currentStreetRows.find(r => r.KapiNo === enKucuk) || currentStreetRows[0];
  }

  if(!row){ return; }

  const label = `${row.SokakAdi} No:${row.KapiNo}, ${row.Mahalle}/${row.Ilce}`;
  resultBox.innerHTML = `<b>${label}</b><br>${row.ApartmanAdi ? row.ApartmanAdi+'<br>' : ''}${row.Enlem}, ${row.Boylam}`;
  resultBox.classList.add('show');

  mapLink.href = buildMapUrl(row.Enlem, row.Boylam, label);
  mapLink.style.display = 'block';
});

// İlçeler sabit: Altıeylül, Karesi (veride hangileri varsa otomatik listelenir)
loadData();
</script>
</body>
</html>
